[pytest]
# Only test_phase1.py contains native pytest-style tests (synchronous, using pytest fixtures).
# test_phase2.py through test_phase8.py are script-style tests that must be run directly:
#   python test_phaseX.py
# They use asyncio.run(run_all()) in __main__ blocks and cannot be collected by pytest directly.
testpaths = .
python_files = test_phase1.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
